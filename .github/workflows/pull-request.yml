name: Test PR
"on": pull_request

permissions:
  contents: read
  pull-requests: write

env:
  # kcov/kcov:latest, pinned for reproducible builds
  KCOV_IMAGE: kcov/kcov@sha256:481289ae32e55e5b733019515acd10948a4f76dfed381765577db909664fc603

jobs:
  install-and-test:
    name: 🛠️ Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v7

      - name: 🗜️ Setup node version
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: 🗜️ Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: 🛠️ Install
        uses: ./.github/actions/cached-deps

      - name: 🛠️ Clean temporary files
        run: yarn clean

      - name: ✅ Validate
        run: yarn validate

      - name: 🛠️ Build coverage tests
        run: yarn coverage:build

      - name: 🧪 Generate coverage
        run: |
          docker run --rm \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --volume "$PWD:$PWD" \
            --workdir "$PWD" \
            --user "$(id -u):$(id -g)" \
            --entrypoint /bin/sh \
            "$KCOV_IMAGE" \
            "$PWD/scripts/coverage.sh"

      - name: 📊 Report coverage
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/report-pr
        with:
          coverage-file: coverage/merged/kcov-merged/cobertura.xml

      - name: 🛠️ Setup package
        run: yarn script:package-npm

      - name: 🛠️ Copy files to dist
        run: yarn copy-files
