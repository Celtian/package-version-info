name: Build & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # Required for OIDC
  contents: read
  packages: write

jobs:
  install-and-build:
    name: 🛠️ Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: 🗜️ Checkout
        uses: actions/checkout@v7

      - name: 🗜️ Setup node version
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: 🗜️ Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: 🛠️ Install
        uses: ./.github/actions/cached-deps

      - name: 🛠️ Clean temporary files
        run: yarn clean

      - name: ✅ Validate
        run: yarn validate

      - name: 🛠️ Build cross-platform package
        run: yarn package

      - name: 🚀 Publish NPM
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == false
        run: cd dist && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🚀 Publish NPM BETA
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == true
        run: cd dist && npm publish --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

      - name: 🛠️ Set up package for GPR
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == false
        run: yarn script:package-github

      - name: 🛠️ Use GPR
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == false
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: "@celtian"

      - name: 🚀 Publish to GitHub Package Registry
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == false
        run: |
          cd dist
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{github.token}}
